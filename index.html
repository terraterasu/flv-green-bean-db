<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>生豆仕入れ先DB</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
header{position:sticky;top:0;background:#000;padding:16px;border-bottom:1px solid #222;z-index:10}
h1{margin:0;font-size:32px;font-weight:900}
.sub{color:#888;font-size:13px;margin-top:4px}
.wrap{padding:12px}
.card{background:#111;border:1px solid #222;border-radius:18px;padding:14px;margin-bottom:10px}
.name{font-size:26px;font-weight:900;line-height:1.2;margin-bottom:10px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge{padding:8px 12px;border-radius:999px;font-size:14px;font-weight:700}
.ok{background:#0f2f22;color:#7ff0b0}
.ng{background:#3a1620;color:#ff9fb4}
.kg{background:#1f1f1f;color:#fff}
.note{font-size:13px;color:#999;line-height:1.5;margin-bottom:12px}
.btn{display:block;text-align:center;background:#fff;color:#000;text-decoration:none;padding:14px;border-radius:14px;font-weight:900;font-size:18px}
.search{width:100%;padding:14px;border-radius:14px;background:#111;border:1px solid #222;color:#fff;font-size:16px;margin-bottom:12px}
</style>
</head>
<body>
<header>
<h1>生豆仕入れ先DB</h1>
<div class="sub">スマホ用シンプル版</div>
</header>

<div class="wrap">
<input id="search" class="search" placeholder="店名検索">

<div id="list"></div>
</div>

<script>
const data = [
{name:"ワイルド珈琲",kg:"0.5kg〜",crop:true,personal:true,url:"https://www.wild-coffee-store.com/"},
{name:"たかおマーケット",kg:"0.5kg〜",crop:true,personal:true,url:"https://item.rakuten.co.jp/takaocoffee/"},
{name:"The Coffee Market",kg:"0.5kg〜",crop:false,personal:true,url:"https://coffee-market.stores.jp/"},
{name:"NoBlendCoffee",kg:"0.9kg〜",crop:false,personal:true,url:"https://www.noblendcoffee.com/"},
{name:"海の向こうコーヒー",kg:"0.2kg〜",crop:true,personal:true,url:"https://uminomukou.bcart.jp/"}
];

function render(){
const q=document.getElementById('search').value.toLowerCase();
document.getElementById('list').innerHTML=data.filter(x=>x.name.toLowerCase().includes(q)).map(x=>`
<div class="card">
<div class="name">${x.name}</div>
<div class="meta">
<div class="badge kg">${x.kg}</div>
<div class="badge ${x.crop?'ok':'ng'}">${x.crop?'クロップ有':'クロップ無'}</div>
<div class="badge ${x.personal?'ok':'ng'}">${x.personal?'個人可':'個人不可'}</div>
</div>
<a class="btn" href="${x.url}" target="_blank">サイトを開く</a>
</div>
`).join('');
}
document.getElementById('search').addEventListener('input',render);
render();
</script>
</body>
</html>
